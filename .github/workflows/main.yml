name: Twitter Video Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      output_folder:
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Create output directory
        run: |
          mkdir -p ${{ github.event.inputs.output_folder }}
          mkdir -p ${{ github.event.inputs.output_folder }}/temp_downloads

      - name: Download Video
        run: |
          python main.py "${{ github.event.inputs.url }}" "${{ github.event.inputs.output_folder }}/temp_downloads"

      - name: Process and split large files
        run: |
          cd ${{ github.event.inputs.output_folder }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          CONTENT_NAME="twitter_video_${TIMESTAMP}"

          if [ -z "$(ls -A temp_downloads)" ]; then
            echo "No files downloaded. Exiting."
            exit 1
          fi

          TOTAL_SIZE=$(du -sm temp_downloads | cut -f1)
          echo "Total download size: ${TOTAL_SIZE}MB"

          if [ $TOTAL_SIZE -gt 100 ]; then
            zip -r -s 100m "${CONTENT_NAME}" temp_downloads/
            rm -rf temp_downloads
          else
            mkdir -p "${CONTENT_NAME}"
            mv temp_downloads/* "${CONTENT_NAME}/"
            rm -rf temp_downloads
          fi

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push files
        run: |
          git add ${{ github.event.inputs.output_folder }}
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add Twitter video download - $(date +%Y-%m-%d_%H:%M:%S)"
          git push

      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: twitter-video-${{ github.run_number }}
          path: ${{ github.event.inputs.output_folder }}
          retention-days: 7
